<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" aria-label="Body muscle heat map">
  <!-- Stylized anterior + posterior body diagram. Each fillable muscle path
       carries class="muscle" plus an id like "chest_left" / "chest_right" or
       just "back" for the single posterior back path. Decorative paths
       (heads, necks, abs block, arm/leg strokes) have no class so the
       renderer ignores them. Initial fill is --border grey; JS overrides
       per-muscle once volumes are computed. -->

  <!-- ANTERIOR (front) -->
  <g transform="translate(40, 10)">
    <text x="60" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#6e6e73" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">ANTERIOR</text>

    <!-- Decorative: head, neck -->
    <path d="M 60,30 C 65,30 68,34 68,40 C 68,46 64,52 60,52 C 56,52 52,46 52,40 C 52,34 55,30 60,30 Z" fill="#e5e5ea"/>
    <path d="M 57,52 L 63,52 L 65,60 L 55,60 Z" fill="#e5e5ea"/>

    <!-- Shoulders (anterior deltoids) -->
    <path class="muscle" id="shoulders_left"  fill="#e5e5ea" d="M 40,65 C 36,65 33,70 34,78 C 35,84 39,88 41,92 L 44,70 Z"/>
    <path class="muscle" id="shoulders_right" fill="#e5e5ea" d="M 80,65 C 84,65 87,70 86,78 C 85,84 81,88 79,92 L 76,70 Z"/>

    <!-- Chest (pectorals) -->
    <path class="muscle" id="chest_left"  fill="#e5e5ea" d="M 60,65 C 57,65 47,67 43,72 C 41,75 42,80 46,81 C 51,82 57,80 59,78 Z"/>
    <path class="muscle" id="chest_right" fill="#e5e5ea" d="M 60,65 C 63,65 73,67 77,72 C 79,75 78,80 74,81 C 69,82 63,80 61,78 Z"/>

    <!-- Biceps -->
    <path class="muscle" id="biceps_left"  fill="#e5e5ea" d="M 33,84 C 30,88 29,94 30,100 C 31,104 34,104 35,100 C 36,96 36,90 34,84 Z"/>
    <path class="muscle" id="biceps_right" fill="#e5e5ea" d="M 87,84 C 90,88 91,94 90,100 C 89,104 86,104 85,100 C 84,96 84,90 86,84 Z"/>

    <!-- Decorative: abs/core block (no muscle class — abs aren't tracked in v2) -->
    <path d="M 52,85 H 68 V 125 H 52 Z" fill="#e5e5ea"/>
    <line x1="60" y1="90" x2="60" y2="120" stroke="#ffffff" stroke-width="1"/>
    <line x1="52" y1="98" x2="68" y2="98" stroke="#ffffff" stroke-width="1"/>
    <line x1="52" y1="108" x2="68" y2="108" stroke="#ffffff" stroke-width="1"/>

    <!-- Quads -->
    <path class="muscle" id="quads_left"  fill="#e5e5ea" d="M 45,135 C 41,150 40,170 42,195 C 44,200 48,200 49,195 C 51,180 50,150 47,135 Z"/>
    <path class="muscle" id="quads_right" fill="#e5e5ea" d="M 75,135 C 79,150 80,170 78,195 C 76,200 72,200 71,195 C 69,180 70,150 73,135 Z"/>

    <!-- Decorative: lower arms + lower legs -->
    <path d="M 28,103 L 24,140" stroke="#e5e5ea" stroke-width="5" stroke-linecap="round"/>
    <path d="M 92,103 L 96,140" stroke="#e5e5ea" stroke-width="5" stroke-linecap="round"/>
    <path d="M 45,200 L 45,260" stroke="#e5e5ea" stroke-width="7" stroke-linecap="round"/>
    <path d="M 75,200 L 75,260" stroke="#e5e5ea" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- POSTERIOR (back) -->
  <g transform="translate(240, 10)">
    <text x="60" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#6e6e73" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">POSTERIOR</text>

    <!-- Decorative: head, neck -->
    <path d="M 60,30 C 65,30 68,34 68,40 C 68,46 64,52 60,52 C 56,52 52,46 52,40 C 52,34 55,30 60,30 Z" fill="#e5e5ea"/>
    <path d="M 57,52 L 63,52 L 65,60 L 55,60 Z" fill="#e5e5ea"/>

    <!-- Back (lats + traps, single bundled path) -->
    <path class="muscle" id="back" fill="#e5e5ea" d="M 60,60 C 50,60 42,70 41,85 C 43,105 55,115 60,115 C 65,115 77,105 79,85 C 78,70 70,60 60,60 Z"/>

    <!-- Triceps -->
    <path class="muscle" id="triceps_left"  fill="#e5e5ea" d="M 33,84 C 30,88 29,94 30,100 C 31,104 34,104 35,100 C 36,96 36,90 34,84 Z"/>
    <path class="muscle" id="triceps_right" fill="#e5e5ea" d="M 87,84 C 90,88 91,94 90,100 C 89,104 86,104 85,100 C 84,96 84,90 86,84 Z"/>

    <!-- Glutes -->
    <path class="muscle" id="glutes_left"  fill="#e5e5ea" d="M 43,122 C 38,122 36,128 36,136 C 36,146 45,152 52,152 C 55,148 57,136 54,128 Z"/>
    <path class="muscle" id="glutes_right" fill="#e5e5ea" d="M 77,122 C 82,122 84,128 84,136 C 84,146 75,152 68,152 C 65,148 63,136 66,128 Z"/>

    <!-- Hamstrings -->
    <path class="muscle" id="hamstrings_left"  fill="#e5e5ea" d="M 45,156 C 41,170 40,190 42,210 C 44,213 48,213 49,210 C 51,195 50,170 47,156 Z"/>
    <path class="muscle" id="hamstrings_right" fill="#e5e5ea" d="M 75,156 C 79,170 80,190 78,210 C 76,213 72,213 71,210 C 69,195 70,170 73,156 Z"/>

    <!-- Decorative: lower arms + lower legs -->
    <path d="M 28,103 L 24,140" stroke="#e5e5ea" stroke-width="5" stroke-linecap="round"/>
    <path d="M 92,103 L 96,140" stroke="#e5e5ea" stroke-width="5" stroke-linecap="round"/>
    <path d="M 45,210 L 45,260" stroke="#e5e5ea" stroke-width="7" stroke-linecap="round"/>
    <path d="M 75,210 L 75,260" stroke="#e5e5ea" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
