<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Workout Tracker</title>

  <link rel="stylesheet" href="/apps/workout/style.css">

  <!-- PWA manifest scoped to /apps/workout/ so this app installs on its own -->
  <link rel="manifest" href="/apps/workout/manifest.json">

  <!-- Apple PWA meta tags for Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="apple-touch-icon" href="/apps/workout/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/apps/workout/icon.svg">
</head>
<body>
  <header class="app-header">
    <a class="back-link" href="/" aria-label="Back to store">‹ Apps</a>
    <h1>Workout Tracker</h1>
  </header>

  <!-- Top segmented control: Log / History / Progress -->
  <nav class="segmented" role="tablist" aria-label="Views">
    <button type="button" class="seg seg--active" role="tab" data-view="log"      aria-selected="true">Log</button>
    <button type="button" class="seg"             role="tab" data-view="history"  aria-selected="false">History</button>
    <button type="button" class="seg"             role="tab" data-view="progress" aria-selected="false">Progress</button>
  </nav>

  <main>
    <!-- LOG VIEW -->
    <section id="view-log" class="view" aria-label="Log a workout">
      <!-- Wispr-first entry (PRD-04 Session B). The textarea is the always-visible
           primary input. Wispr Flow's keyboard, hardware keyboard, and paste all
           fill it directly. Parse runs the same multi-exercise pipeline as voice.
           The mic button is demoted to a small inline link below Parse — kept as
           a fallback for users without Wispr Flow. -->
      <div id="wispr-block" class="wispr-block">
        <label class="field">
          <span class="field__label">Describe your workout</span>
          <textarea id="transcript-text" class="transcript-text" rows="4" placeholder="e.g. bench press 3 sets of 8 at 60, then hammer curls 4 sets of 10 at 15" aria-label="Workout transcript"></textarea>
        </label>
        <div id="voice-error" class="voice-error" hidden></div>
        <button type="button" id="parse-btn" class="btn btn--primary">Parse →</button>
        <button type="button" id="mic-btn" class="mic-link" hidden>🎤 Use device mic instead</button>
      </div>

      <!-- Multi-exercise preview (PRD-04 Session A): populated after parse.
           One <div class="preview-card"> per parsed workout, each editable.
           Save-all writes all entries with one shared timestamp.
           When visible, the wispr-block and manual disclosure below are hidden
           via body.preview-active. -->
      <div id="preview-stack-wrap" hidden>
        <div class="preview-stack__header">Review &amp; save (<span id="preview-count">0</span>)</div>
        <div id="preview-stack" class="preview-stack"></div>
        <div class="preview-actions">
          <button type="button" id="preview-discard-btn" class="btn btn--ghost">Discard all</button>
          <button type="button" id="preview-save-btn"    class="btn btn--primary">Save all</button>
        </div>
      </div>

      <!-- Manual entry, default-collapsed. Native <details> for accessibility. -->
      <details id="manual-disclosure" class="manual-disclosure">
        <summary>Or fill manually</summary>
        <div class="manual-form">
          <label class="field">
            <span class="field__label">Exercise</span>
            <select id="exercise-select"></select>
          </label>

          <button type="button" id="repeat-btn" class="btn btn--secondary">↻ Repeat last workout</button>

          <div class="sets">
            <div class="sets__header">
              <span>Sets</span>
            </div>
            <ul id="sets-list" class="sets__list"></ul>
            <button type="button" id="add-set-btn" class="btn btn--ghost">+ Add set</button>
          </div>

          <label class="field">
            <span class="field__label">Notes (optional)</span>
            <input id="notes-input" type="text" placeholder="How did it feel?">
          </label>

          <!-- RPE chip: shown when voice parse extracted an RPE value. Cleared by tapping ×. -->
          <div id="rpe-row" class="rpe-row" hidden>
            <span class="rpe-chip">RPE <span id="rpe-value">—</span></span>
            <button type="button" id="rpe-clear" class="rpe-clear" aria-label="Clear RPE">×</button>
          </div>

          <button type="button" id="save-btn" class="btn btn--primary">Save workout</button>
        </div>
      </details>

      <!-- Manage custom exercises: visible only when at least one custom exists. -->
      <section id="manage-custom" class="manage-custom" hidden aria-label="Manage custom exercises">
        <h2 class="manage-custom__title">Manage custom exercises</h2>
        <ul id="manage-custom-list" class="manage-custom__list"></ul>
      </section>
    </section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view" aria-label="Workout history" hidden>
      <ul id="history-list" class="history"></ul>
    </section>

    <!-- PROGRESS VIEW -->
    <section id="view-progress" class="view" aria-label="Progress chart" hidden>
      <label class="field">
        <span class="field__label">Exercise</span>
        <select id="progress-select"></select>
      </label>
      <div id="chart-container" class="chart-container"></div>
    </section>
  </main>

  <script src="/apps/workout/app.js" defer></script>
</body>
</html>
