  <!-- Collar rings -->
  <rect x="192" y="148" width="128" height="24" rx="12" fill="#8090aa"/>
  <rect x="192" y="244" width="128" height="24" rx="12" fill="#8090aa"/>
  <rect x="192" y="340" width="128" height="24" rx="12" fill="#8090aa"/>
  <!-- Top cap -->
  <rect x="222" y="40" width="68" height="30" rx="14" fill="#1a3f82"/>
  <!-- Bottom taper -->
  <polygon points="210,452 256,476 302,452" fill="#0d2244"/>
  <!-- Orifice port -->
  <rect x="302" y="220" width="28" height="36" rx="6" fill="#8ab4d4"/>
