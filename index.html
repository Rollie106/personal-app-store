<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Mobile-first viewport: makes the layout scale correctly on iPhone -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Rohan's Apps</title>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/style.css">

  <!-- PWA manifest: lets iPhone "Add to Home Screen" treat the store like an app -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple-specific PWA hints: standalone launch, white status bar, home-screen icon -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Apps">
  <link rel="apple-touch-icon" href="/icon.svg">

  <!-- Favicon (also emoji-based SVG, no PNG needed) -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
</head>
<body>
  <header class="site-header">
    <h1>My Apps</h1>
    <p class="site-tagline">Tap to open. Tap and hold an icon, then "Add to Home Screen" to install.</p>
  </header>

  <main>
    <!-- The card grid. app.js fills this in from apps.json on page load. -->
    <ul id="app-grid" class="app-grid" aria-label="App list"></ul>
  </main>

  <!-- defer so the DOM is parsed before the script runs -->
  <script src="/app.js" defer></script>
</body>
</html>
